<!-- BombGuard App — Boston Tea Party v1.0.0.2 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Boston Tea Party — BombGuard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .game-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* Mobile touch controls overlay */
    .touch-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      pointer-events: none;
      z-index: 100;
    }
    .touch-controls .pad {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }
    .touch-controls .pad.left { left: 20px; }
    .touch-controls .pad.right { right: 20px; }
    .tbtn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(245, 130, 10, 0.75);
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      border: 2px solid rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      user-select: none;
      cursor: pointer;
      touch-action: manipulation;
    }
    .tbtn:active { background: rgba(245, 130, 10, 1); transform: scale(0.95); }
    .tbtn.action { background: rgba(74, 159, 212, 0.8); width: 80px; height: 80px; font-size: 22px; }
    .tbtn.action:active { background: rgba(74, 159, 212, 1); }
    .tbtn.small { width: 48px; height: 48px; font-size: 18px; }
    .back-btn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 200;
      background: rgba(0,0,0,0.6);
      color: #ffb347;
      border: 1px solid rgba(255,179,71,0.5);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      text-decoration: none;
      font-weight: 600;
    }
    .back-btn:hover { background: rgba(0,0,0,0.85); }

    /* Show touch controls on touch devices */
    @media (hover: none) and (pointer: coarse) {
      .touch-controls { display: block; }
      body { padding-bottom: 160px; }
      .game-wrap { bottom: 160px; }
    }
    /* Also show if screen is small */
    @media (max-width: 900px) {
      .touch-controls { display: block; }
    }
  </style>
</head>
<body>
  <a href="../" class="back-btn">← Back</a>

  <div class="game-wrap">
    <iframe id="game" src="game.html" allow="autoplay; fullscreen" scrolling="no"></iframe>
  </div>

  <div class="touch-controls">
    <div class="pad left">
      <div class="tbtn" data-key="ArrowLeft">◀</div>
      <div class="tbtn" data-key="ArrowRight">▶</div>
    </div>
    <div class="pad right" style="flex-direction: column; align-items: center; gap: 6px;">
      <div style="display:flex; gap:6px;">
        <div class="tbtn small" data-key="ArrowUp">▲</div>
        <div class="tbtn small" data-key="ArrowDown">▼</div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <div class="tbtn small" data-key="Enter">⏎</div>
        <div class="tbtn action" data-key=" ">FIRE</div>
      </div>
    </div>
  </div>

  <script>
    // Dispatch synthetic keyboard events into the pygbag iframe
    // so touch buttons simulate key presses.
    const iframe = document.getElementById('game');

    function sendKey(type, key) {
      try {
        const target = iframe.contentWindow;
        if (!target) return;
        const keyCodeMap = {
          'ArrowLeft': 37, 'ArrowRight': 39, 'ArrowUp': 38, 'ArrowDown': 40,
          ' ': 32, 'Enter': 13, 'Escape': 27
        };
        const code = keyCodeMap[key] || key.charCodeAt(0);
        // Try canvas first, then document
        const targets = [];
        try { targets.push(target.document); } catch(e) {}
        try {
          const canvas = target.document && target.document.getElementById('canvas');
          if (canvas) targets.unshift(canvas);
        } catch(e) {}
        targets.forEach(t => {
          const ev = new KeyboardEvent(type, {
            key, code: key === ' ' ? 'Space' : key,
            keyCode: code, which: code,
            bubbles: true, cancelable: true
          });
          t.dispatchEvent(ev);
        });
      } catch (e) { console.warn('key dispatch failed', e); }
    }

    document.querySelectorAll('.tbtn').forEach(btn => {
      const key = btn.dataset.key;
      const press = (e) => { e.preventDefault(); sendKey('keydown', key); };
      const release = (e) => { e.preventDefault(); sendKey('keyup', key); };
      btn.addEventListener('touchstart', press, { passive: false });
      btn.addEventListener('touchend', release, { passive: false });
      btn.addEventListener('touchcancel', release, { passive: false });
      btn.addEventListener('mousedown', press);
      btn.addEventListener('mouseup', release);
      btn.addEventListener('mouseleave', release);
    });

    // Prevent default pinch-zoom and double-tap zoom on mobile
    document.addEventListener('gesturestart', e => e.preventDefault());
    let lastTouch = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouch <= 300) e.preventDefault();
      lastTouch = now;
    }, { passive: false });

    console.log('%cBombGuard v1.0.0.2 — BTP Mobile Wrapper', 'color: #f5820a; font-weight: bold;');
  </script>
</body>
</html>
