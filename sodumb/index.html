  <style>
    :root {
      --bg-void:        #4a9fd4;
      --bg-surface:     #1a1a2e;
      --color-primary:  #f5820a;
      --color-primary-glow: #ffb347;
      --text-primary:   #f0f0f0;
      --text-muted:     #888899;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 2rem;
    }
    .logo-wrap img {
      max-width: 320px;
      width: 90vw;
      border-radius: 16px;
      filter: brightness(0.45);
    }
    .wip-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: clamp(1.8rem, 6vw, 3rem);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-primary-glow);
      text-shadow: 0 0 20px rgba(245, 130, 10, 0.7), 0 2px 8px rgba(0,0,0,0.8);
    }
    .subtitle {
      color: var(--text-primary);
      font-size: 1.1rem;
      margin-bottom: 2rem;
      opacity: 0.85;
    }
    .back-link {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--bg-surface);
      text-decoration: none;
      border: 2px solid var(--bg-surface);
      padding: 0.5rem 1.5rem;
      border-radius: 6px;
      transition: background 200ms ease, color 200ms ease;
    }
    .back-link:hover {
      background: var(--bg-surface);
      color: var(--color-primary-glow);
    }
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
