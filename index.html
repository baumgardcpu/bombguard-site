<!-- BombGuard App — v1.0.0.1 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BombGuard — App Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@500;600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void:        #4a9fd4;
      --bg-surface:     #1a1a2e;
      --bg-surface-alt: #16213e;
      --color-primary:  #f5820a;
      --color-primary-glow: #ffb347;
      --color-secondary: #4a9fd4;
      --color-secondary-deep: #1e5fa8;
      --color-accent:   #ffd700;
      --color-chrome:   #b0c4de;
      --text-primary:   #f0f0f0;
      --text-muted:     #888899;
      --color-danger:   #e63946;
      --color-success:  #2ecc71;
      --gradient-primary: linear-gradient(135deg, #f5820a, #ffb347);
      --gradient-secondary: linear-gradient(135deg, #1e5fa8, #4a9fd4);
      --gradient-dark: linear-gradient(180deg, #1a1a2e, #000000);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    .logo {
      max-width: 400px;
      width: 90%;
      height: auto;
      filter: drop-shadow(0 0 24px rgba(245, 130, 10, 0.3));
    }

    .tagline {
      font-family: 'Exo 2', sans-serif;
      font-weight: 500;
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-top: 0.75rem;
      letter-spacing: 0.05em;
    }

    main {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
    }

    .section-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .app-card {
      background: var(--bg-surface);
      border: 1px solid rgba(176, 196, 222, 0.15);
      border-radius: 10px;
      padding: 1.5rem;
      text-decoration: none;
      color: var(--text-primary);
      transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 20px rgba(245, 130, 10, 0.25);
      border-color: rgba(245, 130, 10, 0.4);
    }

    .app-card .app-icon {
      font-size: 2rem;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface-alt);
      border-radius: 10px;
      margin-bottom: 0.25rem;
    }

    .app-card .app-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.03em;
      color: var(--color-primary-glow);
    }

    .app-card .app-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .app-card .app-tag {
      display: inline-block;
      margin-top: auto;
      padding-top: 0.5rem;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-secondary);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 1rem;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(176, 196, 222, 0.1);
    }
  </style>
</head>

  <script>
    // BombGuard App — v1.0.0.1
    console.log('%cBombGuard v1.0.0.1', 'color: #f5820a; font-weight: bold;');

    // =====================================================
    //  APP DIRECTORY — Edit this array to add/remove apps
    // =====================================================
    // Generate pixel-art Benjamin Franklin player icon
    function makeFranklinIcon() {
      const c = document.createElement('canvas');
      c.width = 48; c.height = 48;
      const ctx = c.getContext('2d');
      const SKIN = '#ebc8a0', COAT = '#283c96', PANTS = '#beaa82', HAIR = '#b4b4b4';
      // Boots
      ctx.fillStyle = '#111'; ctx.fillRect(16, 44, 7, 4); ctx.fillRect(25, 44, 7, 4);
      // Tan pants
      ctx.fillStyle = PANTS; ctx.fillRect(17, 36, 6, 9); ctx.fillRect(25, 36, 6, 9);
      // Blue coat body
      ctx.fillStyle = COAT; ctx.fillRect(14, 20, 20, 17);
      // Gold buttons
      ctx.fillStyle = '#dccc3c';
      ctx.fillRect(23, 23, 2, 2); ctx.fillRect(23, 28, 2, 2); ctx.fillRect(23, 33, 2, 2);
      // Arms
      ctx.fillStyle = COAT; ctx.fillRect(10, 22, 5, 12); ctx.fillRect(33, 22, 5, 12);
      // Hands
      ctx.fillStyle = SKIN; ctx.fillRect(10, 34, 5, 3); ctx.fillRect(33, 34, 5, 3);
      // Head
      ctx.fillStyle = SKIN;
      ctx.beginPath(); ctx.arc(24, 13, 8, 0, Math.PI * 2); ctx.fill();
      // Gray hair (sides + top)
      ctx.fillStyle = HAIR;
      ctx.fillRect(14, 10, 5, 10); ctx.fillRect(29, 10, 5, 10);
      ctx.beginPath(); ctx.ellipse(24, 8, 9, 4, 0, Math.PI, 2 * Math.PI); ctx.fill();
      // Tricorn hat
      ctx.fillStyle = '#1e1e1e';
      ctx.fillRect(15, 4, 18, 5);
      ctx.beginPath();
      ctx.moveTo(11, 9); ctx.lineTo(37, 9); ctx.lineTo(31, 5); ctx.lineTo(24, 2); ctx.lineTo(17, 5);
      ctx.closePath(); ctx.fill();
      // Round glasses
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(21, 13, 3, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(27, 13, 3, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(24, 13); ctx.lineTo(24, 13); ctx.stroke();
      // Eyes behind glasses
      ctx.fillStyle = '#222'; ctx.fillRect(20, 12, 2, 2); ctx.fillRect(26, 12, 2, 2);
      return c.toDataURL();
    }

    const APPS = [
      {
        name: "Boston Tea Party",
        description: "Historical strategy game set during the American Revolution.",
        url: "#",
        icon: `<img src="${makeFranklinIcon()}" alt="Player Character" style="width:36px;height:36px;image-rendering:pixelated">`,
        tag: "Game"
      },
      {
        name: "Holgry",
        description: "Discover and explore new destinations with smart recommendations.",
        url: "https://holgry.app",
        icon: `<img src="holgry_logo.png" alt="Holgry" style="width:36px;height:36px;object-fit:contain;border-radius:6px">`,
        tag: "Travel"
      },
      {
        name: "SoDumb.app",
        description: "Connect, share, and engage with your community.",
        url: "sodumb/",
        icon: `<img src="socialsnack_logo.png" alt="SoDumb" style="width:36px;height:36px;object-fit:contain;border-radius:6px">`,
        tag: "Social"
      }
      // To add a new app, copy the block below and fill it in:
      // {
      //   name: "App Name",
      //   description: "Short description of what the app does.",
      //   url: "https://your-app-url.com",
      //   icon: "🚀",
      //   tag: "Category"
      // }
    ];

    // Render
    const grid = document.getElementById('apps-grid');
    if (APPS.length === 0) {
      grid.innerHTML = '<p class="empty-state">No apps yet. Check back soon.</p>';
    } else {
      grid.innerHTML = APPS.map(app => `
        <a href="${app.url}" class="app-card" ${app.url.startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>
          <div class="app-icon">${app.icon}</div>
          <div class="app-name">${app.name}</div>
          <div class="app-desc">${app.description}</div>
          <span class="app-tag">${app.tag}</span>
        </a>
      `).join('');
    }
